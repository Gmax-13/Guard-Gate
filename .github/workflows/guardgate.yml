name: GuardGate Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install GuardGate
        run: npm install -g guardgate@latest

      - name: Run GuardGate Scan
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: guardgate scan --format all --remediate
        continue-on-error: true # Don't fail the workflow immediately — we still need to upload reports

      - name: Upload Report to Dashboard
        if: always()
        env:
          GUARDGATE_API_KEY: ${{ secrets.GUARDGATE_API_KEY }}
          GUARDGATE_DASHBOARD_URL: ${{ vars.GUARDGATE_DASHBOARD_URL }}
        run: |
          # Find the latest JSON report in the .guardgate directory
          REPORT_FILE=$(ls -t .guardgate/guardgate-report-*.json 2>/dev/null | head -n 1)
          
          if [ -z "$REPORT_FILE" ]; then
            echo "No scan report found!"
            exit 1
          fi

          if [ -z "$GUARDGATE_API_KEY" ] || [ -z "$GUARDGATE_DASHBOARD_URL" ]; then
            echo "API Key or Dashboard URL not provided. Skipping upload."
            exit 0
          fi

          echo "Uploading $REPORT_FILE to $GUARDGATE_DASHBOARD_URL..."
          
          curl -X POST "$GUARDGATE_DASHBOARD_URL/api/reports" \
            -H "Authorization: Bearer $GUARDGATE_API_KEY" \
            -H "Content-Type: application/json" \
            -d @"$REPORT_FILE"

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .guardgate/
          category: guardgate-security-scan
        continue-on-error: true # Don't fail if SARIF upload fails (e.g., GHAS not enabled)
