name: 'GuardGate Security Scan'
description: 'Run GuardGate security scans (secrets, SBOM, E2E) on your codebase'
author: 'GuardGate'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  severity-threshold:
    description: 'Minimum severity to fail the check (info|low|medium|high|critical)'
    required: false
    default: 'high'
  modules:
    description: 'Which scanner modules to run (secrets,sbom,e2e or all)'
    required: false
    default: 'all'
  config-path:
    description: 'Path to guardgate.config.yml'
    required: false
    default: ''
  dashboard-url:
    description: 'URL of the GuardGate dashboard API to upload results to'
    required: false
    default: ''
  dashboard-api-key:
    description: 'API key for dashboard upload authentication'
    required: false
    default: ''
  target-url:
    description: 'Target URL for E2E security testing'
    required: false
    default: ''
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'

outputs:
  passed:
    description: 'Whether all scans passed (true/false)'
    value: ${{ steps.scan.outputs.passed }}
  report-path:
    description: 'Path to the JSON report file'
    value: ${{ steps.scan.outputs.report-path }}
  findings-count:
    description: 'Total number of findings'
    value: ${{ steps.scan.outputs.findings-count }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Install GuardGate CLI
      shell: bash
      run: |
        cd ${{ github.action_path }}/../..
        pnpm install --frozen-lockfile
        pnpm --filter guardgate build

    - name: Install Playwright browsers (for E2E)
      if: contains(inputs.modules, 'e2e') || inputs.modules == 'all'
      shell: bash
      run: npx playwright install chromium --with-deps

    - name: Run GuardGate Scan
      id: scan
      shell: bash
      run: |
        # Build the command
        CMD="node ${{ github.action_path }}/../../packages/cli/dist/index.js scan"
        
        # Select modules
        if [ "${{ inputs.modules }}" = "all" ]; then
          CMD="$CMD all"
        else
          IFS=',' read -ra MODULES <<< "${{ inputs.modules }}"
          for module in "${MODULES[@]}"; do
            CMD="$CMD $module"
          done
        fi
        
        # Add options
        CMD="$CMD --severity ${{ inputs.severity-threshold }}"
        CMD="$CMD --format json"
        CMD="$CMD --output .guardgate"
        
        if [ -n "${{ inputs.config-path }}" ]; then
          CMD="$CMD --config ${{ inputs.config-path }}"
        fi
        
        # Run the scan (don't fail the step yet)
        set +e
        eval $CMD
        EXIT_CODE=$?
        set -e
        
        # Find the generated report
        REPORT_PATH=$(ls -t .guardgate/guardgate-report-*.json 2>/dev/null | head -1)
        
        if [ -n "$REPORT_PATH" ]; then
          echo "report-path=$REPORT_PATH" >> $GITHUB_OUTPUT
          
          # Extract summary data from the report
          FINDINGS=$(node -e "const r=JSON.parse(require('fs').readFileSync('$REPORT_PATH','utf-8')); console.log(r.summary.totalFindings)")
          PASSED=$(node -e "const r=JSON.parse(require('fs').readFileSync('$REPORT_PATH','utf-8')); console.log(r.summary.passed)")
          
          echo "findings-count=$FINDINGS" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
        else
          echo "report-path=" >> $GITHUB_OUTPUT
          echo "findings-count=0" >> $GITHUB_OUTPUT
          echo "passed=false" >> $GITHUB_OUTPUT
        fi
        
        exit $EXIT_CODE

    - name: Upload Report Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: guardgate-report
        path: .guardgate/guardgate-report-*.json
        if-no-files-found: ignore

    - name: Post PR Comment
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const reportPath = '${{ steps.scan.outputs.report-path }}';
          
          if (!reportPath || !fs.existsSync(reportPath)) {
            console.log('No report found, skipping PR comment');
            return;
          }
          
          const report = JSON.parse(fs.readFileSync(reportPath, 'utf-8'));
          const passed = report.summary.passed;
          const totalFindings = report.summary.totalFindings;
          
          // Build the comment body
          const statusIcon = passed ? '✅' : '❌';
          const statusText = passed ? 'PASSED' : 'FAILED';
          
          let body = `## ${statusIcon} GuardGate Security Scan — ${statusText}\n\n`;
          body += `| Module | Status | Findings |\n`;
          body += `|--------|--------|----------|\n`;
          
          for (const mod of report.modules) {
            const modIcon = mod.passed ? '✅' : '❌';
            const modName = mod.module.toUpperCase();
            body += `| ${modName} | ${modIcon} ${mod.passed ? 'Pass' : 'Fail'} | ${mod.findingCount} |\n`;
          }
          
          body += `\n**Total findings:** ${totalFindings}\n`;
          body += `**Duration:** ${(report.durationMs / 1000).toFixed(1)}s\n`;
          body += `**Commit:** \`${report.repository.commitSha.substring(0, 8)}\`\n\n`;
          
          // Top 5 findings
          if (totalFindings > 0) {
            body += `### Top Findings\n\n`;
            const allFindings = report.modules.flatMap(m => m.findings);
            const severityOrder = { critical: 0, high: 1, medium: 2, low: 3, info: 4 };
            allFindings.sort((a, b) => (severityOrder[a.severity] ?? 5) - (severityOrder[b.severity] ?? 5));
            
            for (const finding of allFindings.slice(0, 5)) {
              const sevEmoji = { critical: '🔴', high: '🟠', medium: '🟡', low: '🔵', info: 'ℹ️' };
              body += `- ${sevEmoji[finding.severity] || '⚪'} **${finding.severity.toUpperCase()}** — ${finding.ruleName}: ${finding.message}\n`;
            }
            
            if (allFindings.length > 5) {
              body += `\n_...and ${allFindings.length - 5} more. See the full report artifact._\n`;
            }
          }
          
          body += `\n---\n_Scanned by [GuardGate](https://github.com/your-org/guardgate)_`;
          
          // Find existing comment to update
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          
          const existingComment = comments.find(c => c.body.includes('GuardGate Security Scan'));
          
          if (existingComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existingComment.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Upload to Dashboard
      if: always() && inputs.dashboard-url != '' && inputs.dashboard-api-key != ''
      shell: bash
      run: |
        REPORT_PATH="${{ steps.scan.outputs.report-path }}"
        if [ -n "$REPORT_PATH" ] && [ -f "$REPORT_PATH" ]; then
          curl -s -X POST \
            "${{ inputs.dashboard-url }}/api/reports" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ inputs.dashboard-api-key }}" \
            -d @"$REPORT_PATH"
          echo "Report uploaded to dashboard"
        fi
